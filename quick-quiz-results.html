            border: none;

<body>
    <div class="results-container">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <h1>Here's Your Perfect Course!</h1>

        <!-- Recommendation Block -->
        <div class="recommendation-card" id="recommendation-block">
            <div class="recommendation-icon" id="rec-icon">
                <i class="fas fa-puzzle-piece"></i>
            </div>
            <h2 class="recommendation-heading" id="rec-heading">We think your child would love Scratch!</h2>
            <p class="recommendation-description" id="rec-description"></p>
            <p class="recommendation-disclaimer">
                This recommendation is based on your answers. Get in touch with us to book a free taster or ask any questions about our courses!
            </p>
        </div>

        <!-- Contact Buttons -->

            <a href="https://wa.me/447572592298?text=Hi%2C%20I%20am%20interested%20in%20learning%20more%20about%20your%20coding%20lessons!"
               target="_blank"
               class="contact-btn whatsapp-btn">
                <i class="fab fa-whatsapp me-2"></i>Message Us on WhatsApp
            </a>
            <a href="mailto:hello@headstartcoding.co.uk?subject=Coding%20lessons%20enquiry"
               class="contact-btn email-btn">
                <i class="fas fa-envelope me-2"></i>Email Us
            </a>
        </div>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>Back to website
        </a>
    </div>

    <!-- Load recommendation from URL parameters -->
    <script>
        // Get recommendation data from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const courseName = urlParams.get('course') || 'Scratch';
        const courseIcon = urlParams.get('icon') || 'fas fa-puzzle-piece';
        const courseDescription = urlParams.get('description') || "Your child will build their own games, animations, and stories — no experience needed, just curiosity. They'll finish the session buzzing, already proud of what they've made.";
        const courseColor = urlParams.get('color') || '#FFB628';

        // Update the page with the recommendation
        document.getElementById('rec-icon').innerHTML = '<i class="' + courseIcon + '"></i>';
        document.getElementById('rec-heading').textContent = 'We think your child would love ' + courseName + '!';
        document.getElementById('rec-description').textContent = courseDescription;
        document.querySelector('.recommendation-card').style.borderLeftColor = courseColor;
    </script>
</body>
